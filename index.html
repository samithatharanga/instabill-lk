<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBill LK v9 (The Ultimate Painkiller Edition)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="form-section">
            <header class="main-header">
                 <div class="header-top">
                    <h1>InstaBill LK v9</h1>
                    <div class="status-indicators">
                        <span id="current-cashier"></span>
                        <div id="offline-indicator"></div>
                    </div>
                </div>
                <div class="pro-features">
                    <button id="open-dashboard-btn">Dashboard 📊</button>
                    <button id="open-ledger-btn">Credit Ledger ණය පොත</button>
                    <button id="open-catalog-btn">Inventory 📦</button>
                    <button id="open-settings-btn">Settings ⚙️</button>
                </div>
            </header>

            <input type="text" id="business-name" placeholder="Business Name">
            <input type="text" id="customer-name" placeholder="Customer Name" list="customers-datalist">
            <datalist id="customers-datalist"></datalist>
            <input type="tel" id="customer-phone" placeholder="Customer Phone (Optional)">
            <input type="date" id="receipt-date">

            <div class="items-section">
                <h2>Items</h2>
                <div id="items-list"></div>
                <datalist id="product-datalist"></datalist>
                <div class="item-controls">
                     <button id="add-item-btn">+ Add</button>
                     <button id="scan-barcode-btn">📷 Scan</button>
                     <button id="speak-item-btn">🎤 Speak</button>
                </div>
            </div>

            <div class="advanced-calculations">
                <div class="discount-control">
                    <select id="discount-type">
                        <option value="percentage">Discount (%%)</option>
                        <option value="flat">Discount (Rs.)</option>
                    </select>
                    <input type="number" id="discount-value" placeholder="Value" min="0">
                </div>
                <input type="number" id="delivery-charge" placeholder="Delivery Charge (Rs.)" min="0">
            </div>

            <div class="action-buttons">
                 <div class="payment-mode">
                    <select id="payment-status">
                        <option value="paid">Paid (Cash/Bank)</option>
                        <option value="credit">Credit (To be paid later)</option>
                    </select>
                </div>
                <button id="finalize-btn" class="main-action">Finalize</button>
                <button id="print-receipt-btn" class="main-action">Print</button>
                <button id="hold-bill-btn">Hold</button>
            </div>
        </div>
        <div class="receipt-section">
             <div id="receipt-preview" class="theme-classic">
                <!-- Content generated by JS -->
             </div>
        </div>
    </div>

    <!-- Modals -->
     <div id="credit-ledger-modal" class="modal"><div class="modal-content wide">
        <span class="close-btn">&times;</span>
        <h2>Credit Ledger (ණය පොත)</h2>
        <div id="credit-ledger-list"></div>
    </div></div>

    <div id="product-catalog-modal" class="modal"><div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Manage Products & Inventory</h2>
        <form id="add-product-form">
            <input type="text" id="product-name-input" placeholder="Product Name" required>
            <input type="number" id="product-price-input" placeholder="Price" min="0" required>
            <input type="number" id="product-stock-input" placeholder="Stock Qty" min="0">
            <input type="text" id="product-barcode-input" placeholder="Barcode">
            <button type="submit">Add/Update</button>
        </form>
        <div id="product-list"></div>
    </div></div>

    <div id="sales-dashboard-modal" class="modal"><div class="modal-content wide">
        <span class="close-btn">&times;</span>
        <h2>Dashboard</h2>
        <div class="dashboard-grid">
             <div class="dashboard-card sales"><p>Sales (Today)</p><strong id="total-sales">Rs. 0.00</strong></div>
             <div class="dashboard-card expenses"><p>Expenses (Today)</p><strong id="total-expenses">Rs. 0.00</strong></div>
             <div class="dashboard-card profit"><p>Net Profit (Today)</p><strong id="net-profit">Rs. 0.00</strong></div>
        </div>
        <div class="dashboard-actions">
            <button id="z-report-btn">Generate Z-Report</button>
            <select id="cashier-filter"></select>
        </div>
        <canvas id="sales-chart" width="400" height="150"></canvas>
        <h3>Recent Receipts</h3>
        <div id="sales-history-list"></div>
    </div></div>

    <div id="settings-modal" class="modal"><div class="modal-content wide">
        <span class="close-btn">&times;</span>
        <h2>Settings</h2>
        <div class="settings-grid">
            <div class="settings-section">
                <h3>Taxes & Theme</h3>
                <label><input type="checkbox" id="apply-vat"> Apply VAT (18%)</label>
                <label><input type="checkbox" id="apply-sscl"> Apply SSCL (2.5%)</label>
                <select id="receipt-theme-select">
                    <option value="theme-classic">Classic Retail</option>
                    <option value="theme-modern">Modern Minimal</option>
                </select>
                <h3>Data</h3>
                <button id="backup-data-btn">Backup</button>
                <button id="restore-data-btn">Restore</button>
                <input type="file" id="restore-data-input" style="display: none;">
            </div>
            <div class="settings-section">
                <h3>Manage Cashiers</h3>
                <form id="add-cashier-form">
                    <input type="text" id="cashier-name-input" placeholder="New Cashier" required>
                    <button type="submit">Add</button>
                </form>
                <div id="cashier-list"></div>
            </div>
        </div>
    </div></div>

    <div id="z-report-modal" class="modal"><div class="modal-content thermal-print">
        <span class="close-btn">&times;</span>
        <div id="z-report-content"></div>
        <button id="print-z-report-btn">Print Z-Report</button>
    </div></div>

    <!-- All other modals from v8 -->
    <div id="expenses-modal" class="modal"><div class="modal-content"><span class="close-btn">&times;</span><h2>Expenses</h2><form id="add-expense-form"><input type="text" id="expense-desc-input" required placeholder="Description"><input type="number" id="expense-amount-input" required placeholder="Amount"><button type="submit">Add</button></form><div id="expense-list"></div></div></div>
    <div id="held-bills-modal" class="modal"><div class="modal-content"><span class="close-btn">&times;</span><h2>Held Bills</h2><div id="held-bills-list"></div></div></div>
    <div id="barcode-scanner-modal" class="modal"><div class="modal-content"><span class="close-btn">&times;</span><h2>Scan Barcode</h2><div id="barcode-scanner"></div></div></div>


    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
